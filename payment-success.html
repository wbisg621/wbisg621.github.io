<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Received | Wellbeing Initiative Singapore</title>
  <meta name="payment-api-base" content="https://wellbeinginitiativesg.vercel.app" />
  <style>
    :root {
      --ink: #17211f;
      --muted: #5d6b66;
      --line: #d9e2dd;
      --paper: #fffdf8;
      --green: #0f6b4f;
      --soft: #eef7f0;
    }

    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(180deg, #fffdf8 0%, #f6f0e5 100%);
    }

    main {
      width: min(620px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,253,248,0.94);
      padding: 30px;
      box-shadow: 0 18px 45px rgba(23, 33, 31, 0.12);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--green);
      font-family: Arial, sans-serif;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 3.25rem);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
      font-family: Arial, sans-serif;
    }

    a {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      border-radius: 8px;
      padding: 10px 13px;
      text-decoration: none;
      font-weight: 800;
    }

    .primary {
      background: var(--green);
      color: #fff;
    }

    .secondary {
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--ink);
    }

    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 8px;
      background: var(--soft);
      color: var(--green);
      font-family: Arial, sans-serif;
      font-size: 0.95rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Thank you</p>
    <h1>Your support means a lot.</h1>
    <p>
      Your checkout has returned successfully. Thank you for helping Wellbeing Initiative Singapore
      continue its research-informed outreach and community work.
    </p>
    <p class="status" id="emailStatus">Finalizing your receipt and thank-you email...</p>
    <div class="actions">
      <a class="primary" href="/index.html">Return home</a>
      <a class="secondary" href="/support.html">Make another contribution</a>
    </div>
  </main>
  <script>
    const apiBase = document.querySelector('meta[name="payment-api-base"]').content.replace(/\/$/, '');
    const pendingContributionKey = 'wisPendingContribution';
    const statusNode = document.getElementById('emailStatus');

    function parseStoredContribution() {
      try {
        const raw = sessionStorage.getItem(pendingContributionKey);
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        return null;
      }
    }

    async function postJson(url, body) {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const text = await response.text();
      let payload = {};

      try {
        payload = text ? JSON.parse(text) : {};
      } catch (error) {
        throw new Error('The email service returned an unexpected response.');
      }

      if (!response.ok) {
        throw new Error(payload.message || 'Unable to send email notifications.');
      }

      return payload;
    }

    (async () => {
      const contribution = parseStoredContribution();

      if (!contribution) {
        statusNode.textContent = 'Your payment was completed. If you entered an email address, your confirmation will follow shortly.';
        return;
      }

      try {
        await postJson(`${apiBase}/api/send-support-thank-you`, contribution);
        sessionStorage.removeItem(pendingContributionKey);
        statusNode.textContent = 'Your payment was completed and your thank-you email has been sent.';
      } catch (error) {
        statusNode.textContent = error.message || 'Your payment was completed, but the email confirmation could not be sent automatically.';
      }
    })();
  </script>
</body>
</html>
