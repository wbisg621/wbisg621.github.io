<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Cancelled | Wellbeing Initiative Singapore</title>
  <style>
    :root {
      --ink: #17211f;
      --muted: #5d6b66;
      --line: #d9e2dd;
      --paper: #fffdf8;
      --green: #0f6b4f;
      --soft: #eef7f0;
    }

    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(180deg, #fffdf8 0%, #f6f0e5 100%);
    }

    main {
      width: min(620px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,253,248,0.94);
      padding: 30px;
      box-shadow: 0 18px 45px rgba(23, 33, 31, 0.12);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--green);
      font-family: Arial, sans-serif;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 3.25rem);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
      font-family: Arial, sans-serif;
    }

    a {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      border-radius: 8px;
      padding: 10px 13px;
      text-decoration: none;
      font-weight: 800;
    }

    .primary {
      background: var(--green);
      color: #fff;
    }

    .secondary {
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--ink);
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Payment not completed</p>
    <h1>No payment was taken.</h1>
    <p>
      The checkout was cancelled or did not complete. You can return to the support page whenever you are ready.
    </p>
    <div class="actions">
      <a class="primary" href="/support.html">Try again</a>
      <a class="secondary" href="/index.html">Return home</a>
    </div>
  </main>
  <script>
    try {
      sessionStorage.removeItem('wisPendingContribution');
    } catch (error) {
      // Ignore storage issues on the cancelled page.
    }
  </script>
</body>
</html>
